services:
  fagaos-control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    image: fagaos/control-plane:latest
    container_name: fagaos-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - FAGAOS_CONTROL_PLANE_STATE_FILE=/app/data/control-plane-state.json
      # Generate a key with: openssl rand -hex 32
      # - FAGAOS_AUDIT_KEY=<hex-key>
    volumes:
      - fagaos-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/healthz').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  fagaos-data:
