name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint / typecheck / unit tests / coverage / release gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Verify
        run: npm run verify

      # Coverage gate matches the QA strategy in docs/qa-strategy.md:
      #   - >= 90% on the audit log primitive (critical path)
      #   - >= 80% overall
      # vitest's `coverage.thresholds` block already enforces this and fails
      # the run when coverage drops. We surface the summary as an artifact.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: coverage/release-gate-report.json
          retention-days: 14
